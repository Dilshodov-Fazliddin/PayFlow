spring:
  application:
    name: PayFlow

  datasource:
    url: jdbc:postgresql://localhost:5432/my_database
    username: my_user
    password: my_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 10
        order_updates: true
        order_inserts: true
        format_sql: true
        generate_statistics: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    baseline-version: 0
    schemas: postgres

jwt:
  secret-key: bXlTdXBlclNlY3JldEtleVRoYXRJc0xvbmdFbm91Z2g=
  expiration: 86400000