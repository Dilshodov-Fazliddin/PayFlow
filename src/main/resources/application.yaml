spring:
  application:
    name: PayFlow

  datasource:
    url: jdbc:postgresql://localhost:5432/my_database
    username: my_user
    password: my_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 10
        order_updates: true
        order_inserts: true
        format_sql: true

  flyway:
    enabled: false

camunda.bpm:
  generic-properties:
    properties:
      history-time-to-live: P30D

camunda:
  bpm:
    deployment-resource-pattern: classpath*:bpmn/*.bpmn
    database:
      schema-update: true

    history-level: full

    admin-user:
      id: admin
      password: admin
      firstName: Admin
      lastName: User

    authorization:
      enabled: false

    webapp:
      index-redirect-enabled: true

    job-execution:
      enabled: true
      deployment-aware: true

server:
  port: 8080

jwt:
  secret-key: bXlTdXBlclNlY3JldEtleVRoYXRJc0xvbmdFbm91Z2g=
  expiration: 86400000

logging:
  level:
    root: INFO
    com.example: DEBUG
    org.camunda.bpm.engine: INFO
    org.camunda.bpm.engine.persistence: INFO
